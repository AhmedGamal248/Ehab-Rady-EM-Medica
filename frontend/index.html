<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/web-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="EM Medica - Trusted medical supplies and equipment store"
    />
    <title>EM Medica</title>
    <!-- Preconnect to Google Fonts (eliminates DNS + TLS latency) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts non-render-blocking (moved from CSS @import) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Manrope:wght@600;700;800&display=swap"
    />
    <!-- Inline critical CSS: instant background + loading state -->
    <style>
      body {
        background: #f4f8fb;
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #081521; color: #eef8ff; }
      }
      .app-loader {
        align-items: center;
        display: flex;
        height: 100vh;
        justify-content: center;
      }
      .app-loader__spinner {
        animation: app-spin 0.85s linear infinite;
        border: 4px solid rgba(15,110,140,0.15);
        border-radius: 50%;
        border-top-color: #0f6e8c;
        height: 42px;
        width: 42px;
      }
      @keyframes app-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Instant loading state (replaced by React on mount) -->
      <div class="app-loader">
        <div class="app-loader__spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
